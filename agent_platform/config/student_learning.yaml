# 学生 Jarvis — learning 域配置（家庭 Alpha · 三年级）

enabled: true

data:
  root: student_data

# 默认：三年级 · 数学第一单元（混合运算）
default_curriculum:
  grade: "三年级"
  grade_level: 3
  subject: 数学
  unit_id: math-g3-mixed-ops
  unit_title: 混合运算（第一单元）
  textbook_ref: "北师大版·三年级上册"

defaults:
  pipeline_stage: learning

pilot:
  grade_level: 3
  units:
    math: math-g3-mixed-ops
    chinese: chinese-g2-sentence-basic

kp_catalog:
  path: agent_platform/learning/catalog/kp_catalog.json

question_bank:
  seed_paths:
    - agent_platform/learning/question_bank/seed_questions_g2_math.json
    - agent_platform/learning/question_bank/seed_questions_g2_chinese.json
    - agent_platform/learning/question_bank/seed_questions_g3_math_mixed_ops.json
  sqlite_path: agent_platform/learning/question_bank/questions.db

grader:
  numeric_tolerance: 0.001

push:
  batch_size_min: 3
  batch_size_max: 5
  enforce_grade_boundary: true

# 拍批改作业归类器（切片10 / S-B）：题↔KP 闭集匹配 + 置信度三档分流
photo_triage:
  tau_high: 0.85   # ≥ 高置信 → 自动入学情
  tau_low: 0.60    # [tau_low, tau_high) → 待确认；< tau_low 或无匹配 → 待归类收件箱
  llm:
    model: deepseek-chat
    base_url_env: DEEPSEEK_BASE_URL
    api_key_env: DEEPSEEK_API_KEY
    timeout_s: 60

hermes:
  default_student_id: g2-stu-01   # 家庭 Alpha：升三年级后沿用原 id
  inject_system_rules: true

# 数学 + 语文错因（合并 lookup；gap_id 全局唯一）
error_taxonomy:
  version: "2.0.0-g2"
  codes:
    CARRY_ERROR:
      title: 进位错误
      knowledge_point_id: kp-g2-add-carry
      subject: 数学
    BORROW_ERROR:
      title: 退位错误
      knowledge_point_id: kp-g2-sub-borrow
      subject: 数学
    CALCULATION_ERROR:
      title: 计算失误
      knowledge_point_id: kp-g2-add-no-carry
      subject: 数学
      behavior_tags: [粗心]
    PROCEDURE_ERROR:
      title: 运算步骤错误
      knowledge_point_id: kp-g2-add-no-carry
      subject: 数学
    READING_ERROR:
      title: 审题列式错误
      knowledge_point_id: kp-g2-add-carry
      subject: 数学
      behavior_tags: [审题]
    PUNCTUATION_ERROR:
      title: 标点使用错误
      knowledge_point_id: kp-g2-punct-period
      subject: 语文
    WORD_ORDER_ERROR:
      title: 语序不通顺
      knowledge_point_id: kp-g2-word-order
      subject: 语文

mastery:
  required_streak: 3

proactive:
  gap_recurrence_threshold: 3
  exam_prep_days: 3
  attempt_summary_enabled: true

study_plan:
  duration_min: 25
  duration_min_floor: 20
  duration_min_ceiling: 30

evolution:
  enabled: true
  promote_on_mastered: true
  promote_on_wrong_7d_drop: true

# 多维度诊断 v1（配置化，非固定二分）
learning_dimensions:
  - id: basic_knowledge
    title: 基础知识
    signal_error_codes: [CALCULATION_ERROR, PROCEDURE_ERROR, CARRY_ERROR, BORROW_ERROR]
  - id: logic_reasoning
    title: 逻辑推理
    signal_error_codes: [READING_ERROR, WORD_ORDER_ERROR]
  - id: carelessness
    title: 粗心
    signal_error_codes: [CALCULATION_ERROR]
    behavior_tags: [粗心]
  - id: reading_care
    title: 审题
    signal_error_codes: [READING_ERROR]
    behavior_tags: [审题]

student_safety:
  enabled: true
  redirect_template: "这个我没办法帮你。{empathy}我们继续学{subject}吧，要练几题还是看本周学习报告？"
  off_topic_patterns:
    - 代写
    - 帮我写.*作文
    - 游戏
    - 王者荣耀
    - 谈恋爱

parent_report:
  default_period_days: 7
  audience: parent

seed:
  min_questions: 10
  target_questions: 30
  min_taxonomy_codes: 5
  min_remediation_skills: 4
  pilot_units:
    - math-g3-mixed-ops
    - math-g2-add-sub-100
    - chinese-g2-sentence-basic

web_panel:
  host: "127.0.0.1"
  port: 8770
