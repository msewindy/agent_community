# M7 — 校准后处理（US-6 B4）
enabled: true

confidence:
  high_threshold: 0.75
  low_threshold: 0.45

# 低置信输出改写
low_confidence_prefix: "我不太确定，"
uncertain_rewrite: "我不太确定，让我查一下再告诉你。"

# 高敏字段无 source 时强制降级
require_source_for:
  - version
  - date
  - number

sensitive_patterns:
  version: '(?:v|版本\s*)[\d.]+'
  date: '\d{4}[-/年]\d{1,2}[-/月]\d{1,2}|\d{1,2}月\d{1,2}日|上周|昨天|今天'
  number: '(?<!\w)\d+(?:\.\d+)?(?!\w)'

apology:
  enabled: true
  template: "抱歉，我记错了。现在更新为 {new_value}，原记录已废止。"
  no_excuse: true  # 禁止找借口式道歉

audit:
  enabled: true
  log_path: calibration_data/events.log.md
