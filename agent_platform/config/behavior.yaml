drift:
  enabled: true
  threshold: 0.35
  max_chars_short: 280
  filler_patterns:
    - "作为一个AI"
    - "作为一个 AI"
    - "很高兴为你"
    - "非常荣幸"
    - "亲爱的用户"

panel:
  host: 127.0.0.1
  port: 8767
  force_mock_memory: false
