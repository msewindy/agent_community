<div class="toolbar">
  <label>学生
    <select id="studentSelect"><option value="">加载中…</option></select>
  </label>
  <label>周期（天）
    <input id="days" type="number" value="7" min="1" max="90" style="min-width:5rem" />
  </label>
</div>

<div class="tabs">
  <button type="button" id="tabProfile" class="active">学情总览</button>
  <button type="button" id="tabReport" class="secondary">周报</button>
</div>

<div id="profileToolbar" class="toolbar">
  <button type="button" id="btnProfile">刷新学情</button>
</div>
<div id="reportToolbar" class="toolbar hidden">
  <button type="button" id="btnLoad">查看报告</button>
  <button type="button" id="btnSave" class="secondary">生成并保存</button>
</div>

<div id="message"></div>

<div id="unitCard"></div>
<div id="profile" class="overview-grid two-col"></div>
<div id="report" class="hidden"></div>

<script>
  const $ = (id) => document.getElementById(id);
  let kpChoices = [];
  let students = [];

  function showMsg(text, ok) {
    const el = $("message");
    if (!text) { el.textContent = ""; el.className = ""; return; }
    el.className = "msg " + (ok ? "ok" : "err");
    el.textContent = text;
  }

  function currentStudentId() {
    return $("studentSelect").value.trim();
  }

  function statusBadge(status) {
    const map = { weak: "薄弱", active: "在学", mastered: "已掌握", improving: "改善中" };
    const cls = status === "mastered" ? "ok" : "weak";
    return `<span class="badge ${cls}">${map[status] || status}</span>`;
  }

  function renderGaps(gaps) {
    if (!gaps.length) {
      return `<div class="card"><h2>知识点掌握</h2><p class="sub">暂无学情记录。孩子做题或拍照复盘后会出现在这里。</p></div>`;
    }
    const rows = gaps.map(g => `<tr>
      <td>${g.title || g.knowledge_point_id}</td>
      <td>${statusBadge(g.status)}</td>
      <td>错 ${g.stats.total_wrong} / 对 ${g.stats.total_correct}</td>
      <td>${(g.error_breakdown && Object.keys(g.error_breakdown).length)
        ? Object.entries(g.error_breakdown).map(([k,v]) => k + "×" + v).join("、")
        : "—"}</td>
    </tr>`).join("");
    return `<div class="card">
      <h2>知识点掌握</h2>
      <p class="sub">按知识点汇总的掌握情况。</p>
      <table class="data">
        <thead><tr><th>知识点</th><th>状态</th><th>对错</th><th>错因分布</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  function renderPending(items) {
    if (!items.length) {
      return `<div class="card"><h2>尚未归类的题</h2>
        <p class="sub">拍照后若未能自动挂上知识点，会出现在这里。</p>
        <p class="hint">当前没有待处理项。</p></div>`;
    }
    const blocks = items.map(it => {
      const tierLabel = { inbox: "待归类", confirm: "待确认", auto: "自动" }[it.tier] || it.tier;
      const opts = kpChoices.map(k =>
        `<option value="${k.kp_id}">${k.title}（${k.subject}）</option>`
      ).join("");
      return `<div class="pending-item" data-id="${it.entry_id}">
        <div><strong>${it.stem}</strong></div>
        <div class="hint" style="margin-top:0.35rem">学生答案：${it.student_answer || "—"} · 批改：${it.is_correct === null ? "未知" : (it.is_correct ? "对" : "错")}
          · <span class="badge pending">${tierLabel}</span>
          ${it.matched_kp_id ? " · 建议：" + (it.kp_title || it.matched_kp_id) : ""}
        </div>
        <div class="pending-actions">
          <select class="kpSel">${opts}</select>
          <label><input type="radio" name="corr_${it.entry_id}" value="wrong" checked> 错</label>
          <label><input type="radio" name="corr_${it.entry_id}" value="right"> 对</label>
          <button type="button" class="small btnResolve">挂知识点</button>
          <button type="button" class="small warn btnDrop">忽略</button>
        </div>
      </div>`;
    }).join("");
    return `<div class="card"><h2>尚未归类的题（${items.length}）</h2>${blocks}</div>`;
  }

  function bindPendingActions(sid) {
    document.querySelectorAll(".btnResolve").forEach(btn => {
      btn.onclick = async () => {
        const box = btn.closest(".pending-item");
        const entryId = box.dataset.id;
        const kp = box.querySelector(".kpSel").value;
        const isCorrect = box.querySelector(`input[name="corr_${entryId}"]:checked`).value === "right";
        const res = await fetch(`/api/students/${encodeURIComponent(sid)}/learning-profile/pending/${entryId}/resolve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ knowledge_point_id: kp, is_correct: isCorrect }),
        });
        if (!res.ok) { showMsg("归类失败", false); return; }
        showMsg("已挂知识点并入学情", true);
        loadProfile();
      };
    });
    document.querySelectorAll(".btnDrop").forEach(btn => {
      btn.onclick = async () => {
        const box = btn.closest(".pending-item");
        const entryId = box.dataset.id;
        const res = await fetch(`/api/students/${encodeURIComponent(sid)}/learning-profile/pending/${entryId}/drop`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        if (!res.ok) { showMsg("操作失败", false); return; }
        showMsg("已忽略该题", true);
        loadProfile();
      };
    });
  }

  async function loadLearningUnit() {
    const sid = currentStudentId();
    if (!sid) { $("unitCard").innerHTML = ""; return; }
    const res = await fetch(`/api/students/${encodeURIComponent(sid)}/learning-unit`);
    if (!res.ok) { $("unitCard").innerHTML = ""; return; }
    renderUnitCard(await res.json());
  }

  function renderUnitCard(data) {
    const cur = data.current || {};
    const opts = (data.choices || []).map(c => {
      const label = `${c.subject} G${c.grade} · ${c.unit_title}（${c.question_count}题）`;
      const warn = c.question_count === 0 ? " ⚠无题" : "";
      return `<option value="${c.unit_id}" ${c.is_current ? "selected" : ""}>${label}${warn}</option>`;
    }).join("");
    const noQ = (cur.question_count || 0) === 0;
    $("unitCard").innerHTML = `<div class="card">
      <h2>当前学习单元</h2>
      <p class="sub">孩子「来几道题」默认从此单元选题。</p>
      <div><strong>${cur.unit_title || "—"}</strong> <code>${cur.unit_id || ""}</code></div>
      <div class="hint" style="margin-top:0.35rem">题库 ${cur.question_count || 0} 道 · 队列 ${data.queue_size || 0} 道</div>
      ${noQ ? '<div class="unit-warn">⚠ 当前单元无练习题，请先到题库管理录入。</div>' : ""}
      <div class="toolbar" style="margin-bottom:0">
        <label>切换到 <select id="unitSelect">${opts}</select></label>
        <button type="button" id="btnSwitchUnit">切换并更新练习题</button>
      </div>
      <div id="unitSwitchMsg" class="hint"></div>
    </div>`;
    $("btnSwitchUnit").addEventListener("click", switchUnit);
  }

  async function switchUnit() {
    const sid = currentStudentId();
    const unitId = $("unitSelect").value;
    if (!sid || !unitId) return;
    const res = await fetch(`/api/students/${encodeURIComponent(sid)}/learning-unit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ unit_id: unitId }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showMsg("切换失败: " + (data.detail || res.status), false);
      return;
    }
    let msg = `已切换到 ${data.new_unit_title}，队列 ${data.push_queue.item_count} 道题。`;
    $("unitSwitchMsg").textContent = msg + (data.warnings?.length ? " " + data.warnings.join(" ") : "");
    showMsg(msg, !(data.warnings?.length));
    await loadLearningUnit();
    await loadProfile();
  }

  async function loadProfile() {
    const sid = currentStudentId();
    if (!sid) { showMsg("请选择学生", false); return; }
    await loadLearningUnit();
    const res = await fetch(`/api/students/${encodeURIComponent(sid)}/learning-profile`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showMsg("加载学情失败: " + (err.detail || res.status), false);
      return;
    }
    const data = await res.json();
    kpChoices = data.kp_choices || [];
    const inner = renderGaps(data.gaps || []) + renderPending(data.pending_items || []);
    $("profile").innerHTML = inner;
    bindPendingActions(sid);
    showMsg(`已加载：${(data.gaps||[]).length} 个知识点 · ${(data.pending_items||[]).length} 道待归类`, true);
  }

  function renderList(title, items) {
    if (!items?.length) return "";
    return `<div class="card"><h2>${title}</h2><ul>${items.map(i => `<li>${i}</li>`).join("")}</ul></div>`;
  }

  function renderDims(scores) {
    if (!scores?.length) return "";
    const rows = scores.map(d => {
      const pct = Math.round((d.score || 0) * 100);
      return `<div style="margin:0.5rem 0"><strong>${d.title}</strong> · ${pct}% · 信号 ${d.signal_count}
        <div style="background:#e2e8f0;border-radius:4px;height:6px;margin-top:0.25rem"><div style="width:${pct}%;background:#6366f1;height:100%;border-radius:4px"></div></div></div>`;
    }).join("");
    return `<div class="card"><h2>维度诊断</h2>${rows}</div>`;
  }

  function renderReport(data) {
    const rate = data.correct_rate != null ? Math.round(data.correct_rate * 100) + "%" : "—";
    $("report").innerHTML = `
      <div class="card">
        <h2>${data.grade} · ${data.subject} · ${data.unit_title}</h2>
        <p>${data.summary}</p>
        <div class="stats-row" style="margin-top:0.75rem">
          <span class="stat-pill">练习 ${data.attempts_total} 次</span>
          <span class="stat-pill">正确率 ${rate}</span>
          <span class="stat-pill">周期 ${data.period_days} 天</span>
        </div>
      </div>
      ${renderList("知识掌握", data.knowledge_highlights)}
      ${renderDims(data.dimension_scores)}
      ${renderList("行为习惯", data.behavior_notes)}
      ${renderList("下周建议", data.next_steps)}`;
  }

  async function loadReport(save) {
    const sid = currentStudentId();
    const days = $("days").value || "7";
    if (!sid) { showMsg("请选择学生", false); return; }
    const url = save
      ? `/api/students/${encodeURIComponent(sid)}/parent-report/generate?days=${days}`
      : `/api/students/${encodeURIComponent(sid)}/parent-report?days=${days}`;
    const res = await fetch(url, save ? { method: "POST" } : {});
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showMsg("加载失败: " + (err.detail || res.status), false);
      return;
    }
    const data = save ? (await res.json()).report : await res.json();
    renderReport(data);
    showMsg(save ? "报告已生成并保存" : "报告已加载", true);
  }

  function showTab(which) {
    const isProfile = which === "profile";
    $("tabProfile").classList.toggle("active", isProfile);
    $("tabReport").classList.toggle("active", !isProfile);
    $("profileToolbar").classList.toggle("hidden", !isProfile);
    $("reportToolbar").classList.toggle("hidden", isProfile);
    $("unitCard").classList.toggle("hidden", !isProfile);
    $("profile").classList.toggle("hidden", !isProfile);
    $("report").classList.toggle("hidden", isProfile);
  }

  async function loadStudents() {
    const res = await fetch("/api/students");
    if (!res.ok) return;
    students = await res.json();
    const sel = $("studentSelect");
    if (!students.length) {
      sel.innerHTML = '<option value="">暂无学生</option>';
      return;
    }
    sel.innerHTML = students.map(s =>
      `<option value="${s.student_id}">${s.display_name}（${s.grade || "—"}）</option>`
    ).join("");
    const params = new URLSearchParams(location.search);
    const q = params.get("student");
    if (q && students.some(s => s.student_id === q)) sel.value = q;
    sel.addEventListener("change", () => {
      loadLearningUnit();
      if (!$("report").classList.contains("hidden")) return;
      loadProfile();
    });
    await loadLearningUnit();
    await loadProfile();
  }

  $("tabProfile").addEventListener("click", () => showTab("profile"));
  $("tabReport").addEventListener("click", () => showTab("report"));
  $("btnProfile").addEventListener("click", loadProfile);
  $("btnLoad").addEventListener("click", () => loadReport(false));
  $("btnSave").addEventListener("click", () => loadReport(true));
  loadStudents();
</script>
