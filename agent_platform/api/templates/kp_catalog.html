<div id="message"></div>

<div class="card">
  <h2>筛选</h2>
  <div class="toolbar" style="margin-bottom:0">
    <label>学科 <select id="filterSubject"><option value="">全部</option></select></label>
    <label>年级
      <select id="filterGrade">
        <option value="">全部</option>
        <option value="1">1 年级</option>
        <option value="2">2 年级</option>
        <option value="3">3 年级</option>
        <option value="4">4 年级</option>
        <option value="5">5 年级</option>
        <option value="6">6 年级</option>
      </select>
    </label>
    <label>搜索 <input id="filterSearch" type="search" placeholder="单元 / 知识点 / 编号" /></label>
    <button type="button" id="btnRefresh" class="secondary">刷新</button>
  </div>
</div>

<div class="card" id="summaryCard">
  <h2>概览</h2>
  <div class="stats-row" id="stats">加载中…</div>
  <div class="hint" id="catalogPath" style="margin-top:0.5rem"></div>
</div>

<div class="card" id="export">
  <h2>导出草稿</h2>
  <p class="sub">导出为可编辑 <code>.kp.md</code>，修改后在「知识点入库」重新上传。</p>
  <div class="toolbar" style="margin-bottom:0">
    <label>学科 <select id="exportSubject"><option value="">请先加载</option></select></label>
    <label>年级
      <select id="exportGrade">
        <option value="1">1 年级</option>
        <option value="2">2 年级</option>
        <option value="3" selected>3 年级</option>
        <option value="4">4 年级</option>
        <option value="5">5 年级</option>
        <option value="6">6 年级</option>
      </select>
    </label>
    <label style="flex-direction:row;align-items:center;gap:0.35rem;padding-bottom:0.45rem">
      <input type="checkbox" id="exportQuestions" checked /> 含练习题
    </label>
    <button type="button" id="btnExport">导出整册草稿</button>
  </div>
</div>

<div class="card">
  <h2>知识结构</h2>
  <div id="treeRoot" class="kp-tree"><div class="hint" style="padding:1rem 0">加载中…</div></div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let catalogInfo = null;
  let fullTree = null;

  function showMsg(text, ok) {
    const el = $("message");
    if (!text) { el.textContent = ""; el.className = ""; return; }
    el.className = "msg " + (ok ? "ok" : "err");
    el.textContent = text;
  }

  function countTree(tree) {
    let units = 0, kps = 0;
    (tree.subjects || []).forEach(s => (s.grades || []).forEach(g => (g.units || []).forEach(u => {
      units += 1;
      kps += (u.knowledge_points || []).length;
    })));
    return { units, kps };
  }

  function unitMatchesSearch(unit, q) {
    if (!q) return true;
    const blob = [unit.unit_id, unit.unit_title, unit.textbook_ref || ""].join(" ").toLowerCase();
    if (blob.includes(q.toLowerCase())) return true;
    return (unit.knowledge_points || []).some(kp =>
      (kp.knowledge_point_id + " " + kp.title).toLowerCase().includes(q.toLowerCase())
    );
  }

  function filterTree(tree, subject, grade, search) {
    const q = (search || "").trim().toLowerCase();
    const subjects = [];
    (tree.subjects || []).forEach(subj => {
      if (subject && subj.subject !== subject) return;
      const grades = [];
      (subj.grades || []).forEach(g => {
        if (grade && String(g.grade) !== String(grade)) return;
        const units = (g.units || []).filter(u => unitMatchesSearch(u, q));
        if (units.length) grades.push({ grade: g.grade, units });
      });
      if (grades.length) subjects.push({ subject: subj.subject, grades });
    });
    return { subjects };
  }

  function renderStats(tree) {
    const { units, kps } = countTree(tree);
    const subjCount = (tree.subjects || []).length;
    $("stats").innerHTML = `
      <span class="stat-pill"><strong>${subjCount}</strong> 学科</span>
      <span class="stat-pill"><strong>${units}</strong> 单元</span>
      <span class="stat-pill"><strong>${kps}</strong> 知识点</span>`;
    if (catalogInfo) {
      $("catalogPath").textContent = `数据：${catalogInfo.catalog_path} · v${catalogInfo.schema_version}`;
    }
  }

  function renderTree(tree) {
    const root = $("treeRoot");
    if (!tree.subjects?.length) {
      root.innerHTML = '<div class="hint" style="padding:1rem 0">无匹配内容</div>';
      return;
    }
    let html = "";
    tree.subjects.forEach(subj => {
      html += `<details class="tree-subject" open><summary>${subj.subject}<span class="tree-meta">${subj.grades.length} 个年级</span></summary><div class="tree-body">`;
      subj.grades.forEach(g => {
        html += `<details class="tree-grade" open><summary>${g.grade} 年级<span class="tree-meta">${g.units.length} 单元</span></summary><div class="tree-body">`;
        g.units.forEach(u => {
          const kpCount = (u.knowledge_points || []).length;
          html += `<details class="tree-unit"><summary>${u.unit_title}<span class="tree-meta">${kpCount} KP · <code>${u.unit_id}</code></span></summary>
            <div class="tree-body">
              <div class="unit-actions">
                <button type="button" class="small secondary btn-export-unit"
                  data-subject="${encodeURIComponent(subj.subject)}"
                  data-grade="${g.grade}"
                  data-unit-id="${u.unit_id}">导出本单元草稿</button>
                ${u.textbook_ref ? `<span class="hint">${u.textbook_ref}</span>` : ""}
              </div>`;
          (u.knowledge_points || []).forEach(kp => {
            html += `<div class="kp-leaf"><code>${kp.knowledge_point_id}</code><span>${kp.title}</span></div>`;
          });
          html += `</div></details>`;
        });
        html += `</div></details>`;
      });
      html += `</div></details>`;
    });
    root.innerHTML = html;
  }

  function populateSubjectFilter(tree) {
    const sel = $("filterSubject");
    const exportSel = $("exportSubject");
    const current = sel.value;
    const exportCurrent = exportSel.value;
    const opts = ['<option value="">全部</option>'];
    const exportOpts = [];
    (tree.subjects || []).forEach(s => {
      opts.push(`<option value="${s.subject}">${s.subject}</option>`);
      exportOpts.push(`<option value="${s.subject}">${s.subject}</option>`);
    });
    sel.innerHTML = opts.join("");
    exportSel.innerHTML = exportOpts.join("") || '<option value="">无学科</option>';
    if ([...sel.options].some(o => o.value === current)) sel.value = current;
    if ([...exportSel.options].some(o => o.value === exportCurrent)) exportSel.value = exportCurrent;
    else if (exportOpts.length) exportSel.selectedIndex = 0;
  }

  function buildExportUrl(subject, grade, unitId) {
    const q = new URLSearchParams({
      subject,
      grade: String(grade),
      include_questions: $("exportQuestions").checked ? "true" : "false",
    });
    if (unitId) q.set("unit_id", unitId);
    return `/api/kp/catalog/export?${q}`;
  }

  function parseFilename(disposition) {
    if (!disposition) return "export.kp.md";
    const mStar = disposition.match(/filename\*=UTF-8''([^;]+)/i);
    if (mStar) return decodeURIComponent(mStar[1]);
    const m = disposition.match(/filename="([^"]+)"/i);
    return m ? m[1] : "export.kp.md";
  }

  async function startExport(subject, grade, unitId) {
    if (!subject) { showMsg("请选择学科", false); return; }
    showMsg("正在导出…", true);
    try {
      const res = await fetch(buildExportUrl(subject, grade, unitId || null));
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showMsg("导出失败: " + (err.detail || res.status), false);
        return;
      }
      const blob = await res.blob();
      const filename = parseFilename(res.headers.get("Content-Disposition"));
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
      showMsg("已下载 " + filename, true);
    } catch (e) {
      showMsg("导出失败: " + e.message, false);
    }
  }

  function applyFilters() {
    if (!fullTree) return;
    const filtered = filterTree(fullTree, $("filterSubject").value, $("filterGrade").value, $("filterSearch").value);
    renderStats(filtered);
    renderTree(filtered);
  }

  async function loadCatalog() {
    showMsg("");
    try {
      const [infoRes, treeRes] = await Promise.all([
        fetch("/api/kp/catalog/info"),
        fetch("/api/kp/catalog/tree"),
      ]);
      if (!infoRes.ok || !treeRes.ok) throw new Error("加载失败");
      catalogInfo = await infoRes.json();
      fullTree = await treeRes.json();
      populateSubjectFilter(fullTree);
      applyFilters();
    } catch (e) {
      showMsg("加载知识库失败", false);
      $("treeRoot").innerHTML = '<div class="hint">加载失败</div>';
    }
  }

  $("filterSubject").addEventListener("change", applyFilters);
  $("filterGrade").addEventListener("change", applyFilters);
  $("filterSearch").addEventListener("input", applyFilters);
  $("btnRefresh").addEventListener("click", loadCatalog);
  $("btnExport").addEventListener("click", () => startExport($("exportSubject").value, $("exportGrade").value, null));
  $("treeRoot").addEventListener("click", (ev) => {
    const btn = ev.target.closest(".btn-export-unit");
    if (!btn) return;
    startExport(decodeURIComponent(btn.dataset.subject), btn.dataset.grade, btn.dataset.unitId);
  });
  loadCatalog();
</script>
