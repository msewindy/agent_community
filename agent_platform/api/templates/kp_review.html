<div class="page-toolbar">
  <button type="button" id="btnNew">上传 .kp.md</button>
  <a href="/api/kp/format-template" class="btn secondary" style="text-decoration:none">下载模板</a>
</div>
<p class="hint" style="margin:0 1.25rem 0.75rem">
  流程：编写模板 → 上传（可含练习题与知识点 <code>说明：</code>）→ 处理差异 → 批准入库（KP + 题 + Wiki）。
</p>

<div id="message"></div>

<div class="split-layout">
  <aside class="list-pane">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
      <strong style="font-size:0.9rem">提交记录</strong>
      <button type="button" id="btnRefreshList" class="secondary small">刷新</button>
    </div>
    <table class="data">
      <thead><tr><th>文件</th><th>状态</th></tr></thead>
      <tbody id="jobTableBody"><tr><td colspan="2" class="empty">加载中…</td></tr></tbody>
    </table>
  </aside>
  <main class="detail-pane" id="detailPane">
    <div class="empty">请从左侧选择一条提交记录</div>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3>上传 .kp.md</h3>
    <label>选择文件
      <input id="modalFile" type="file" accept=".md,.kp.md,text/markdown" style="width:100%" />
    </label>
    <label>来源路径（选填）
      <input id="modalSourcePath" type="text" placeholder="docs/content/..." style="width:100%" />
    </label>
    <div class="modal-actions">
      <button type="button" id="btnModalCancel" class="secondary">取消</button>
      <button type="button" id="btnModalSubmit">上传并提交</button>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let jobs = [], currentJobId = "", pendingReview = false;

  function showMsg(text, ok) {
    const el = $("message");
    if (!text) { el.className = ""; el.textContent = ""; el.style.margin = "0 1.25rem"; return; }
    el.className = "msg " + (ok ? "ok" : "err");
    el.style.margin = "0 1.25rem 0.75rem";
    el.textContent = text;
  }

  function statusBadge(status, label) {
    const cls = status === "approved" ? "approved" : status === "rejected" ? "rejected" : "pending";
    return `<span class="badge ${cls}">${label || status}</span>`;
  }

  function actionOptions(item, selected) {
    return (item.allowed_actions || []).map(a => {
      const label = (item.action_labels && item.action_labels[a]) || a;
      const sel = selected && a === selected ? " selected" : "";
      return `<option value="${a}"${sel}>${label}</option>`;
    }).join("");
  }

  function renderResolveBox(item) {
    if (!pendingReview || !item.conflict_id || !item.blocking) return "";
    const rename = (item.allowed_actions || []).includes("rename_draft");
    const selected = item.resolution ? item.resolution.action : (item.allowed_actions || [])[0];
    const renameValue = item.resolution?.new_knowledge_point_id
      ? String(item.resolution.new_knowledge_point_id).replace(/"/g, "&quot;") : "";
    return `<div class="resolve-box" data-id="${item.conflict_id}">
      <select class="action-select">${actionOptions(item, selected)}</select>
      ${rename ? `<input class="new-kp-id" type="text" placeholder="新知识点编号" style="min-width:10rem" value="${renameValue}" />` : ""}
      <button type="button" class="btn-resolve secondary small">${item.resolution ? "更新" : "应用"}</button>
    </div>`;
  }

  function renderKbComparison(kb) {
    if (!kb) return "<p>无对比数据</p>";
    let html = "";
    if (kb.unit_notes?.length) {
      html += "<h3>单元名称提示</h3><table class=\"cmp-table\"><thead><tr><th>单元</th><th>库中</th><th>文档</th></tr></thead><tbody>";
      kb.unit_notes.forEach(n => { html += `<tr><td><code>${n.unit_id}</code></td><td>${n.catalog_title||"—"}</td><td>${n.draft_title||"—"}</td></tr>`; });
      html += "</tbody></table>";
    }
    (kb.groups || []).forEach(group => {
      html += `<h3>${group.label}</h3><table class="cmp-table"><thead><tr><th>单元</th><th>编号</th><th>库中</th><th>文档</th><th>操作</th></tr></thead><tbody>`;
      group.items.forEach(item => {
        html += `<tr><td>${item.unit_title||item.unit_id}</td><td><code>${item.knowledge_point_id}</code></td>
          <td>${item.catalog_title||"—"}</td><td>${item.draft_title||"—"}</td><td>${renderResolveBox(item)}</td></tr>`;
      });
      html += "</tbody></table>";
    });
    return html || "<p>与当前知识库无差异</p>";
  }

  function renderDocumentContent(units) {
    if (!units?.length) return "<p>无文档内容</p>";
    return `<div class="doc-tree"><ul>${units.map(u => `
      <li><strong>${u.unit_title}</strong> <code>${u.unit_id}</code>
        ${(u.knowledge_points||[]).length ? `<ul>${u.knowledge_points.map(kp => `<li>${kp.title} <code>${kp.knowledge_point_id}</code></li>`).join("")}</ul>` : ""}
        ${(u.questions||[]).length ? `<div class="hint">练习题 ${u.questions.length} 道</div>` : ""}
      </li>`).join("")}</ul></div>`;
  }

  function renderFormatChecks(items) {
    if (!items?.length) return "<p>无格式检查结果</p>";
    return items.map(item => `<div class="check-item"><span class="${item.satisfied?"ok":"no"}">${item.satisfied?"✓":"✗"}</span><div>${item.title}<div class="hint">${item.detail||""}</div></div></div>`).join("");
  }

  async function loadJobs(selectId) {
    const res = await fetch("/api/kp/ingest/jobs?status=pending_review");
    if (!res.ok) { showMsg("加载失败", false); return; }
    jobs = await res.json();
    const tbody = $("jobTableBody");
    if (!jobs.length) {
      tbody.innerHTML = '<tr><td colspan="2" class="empty">暂无提交</td></tr>';
      return;
    }
    tbody.innerHTML = jobs.map(j => `<tr class="job-row ${j.job_id===currentJobId?"active":""}" data-id="${j.job_id}">
      <td><div>${j.source_filename}</div><div class="hint">${j.subject||""} ${j.grade?j.grade+"年级":""}</div></td>
      <td>${statusBadge(j.status,j.status_label)}</td></tr>`).join("");
    tbody.querySelectorAll(".job-row").forEach(row => row.addEventListener("click", () => selectJob(row.dataset.id)));
    const pick = selectId && jobs.some(j => j.job_id === selectId) ? selectId : jobs[0].job_id;
    await selectJob(pick);
  }

  async function selectJob(jobId) {
    currentJobId = jobId;
    document.querySelectorAll(".job-row").forEach(r => r.classList.toggle("active", r.dataset.id === jobId));
    const res = await fetch(`/api/kp/ingest/jobs/${encodeURIComponent(jobId)}/review`);
    if (!res.ok) { showMsg("加载详情失败", false); return; }
    const data = await res.json();
    pendingReview = data.status === "pending_review";
    renderDetail(data);
  }

  function bindResolveActions() {
    $("detailPane").querySelectorAll(".btn-resolve").forEach(btn => {
      btn.addEventListener("click", async (ev) => {
        const box = ev.target.closest("[data-id]");
        const body = { conflict_id: box.dataset.id, action: box.querySelector(".action-select").value };
        const nk = box.querySelector(".new-kp-id");
        if (nk?.value.trim()) body.new_knowledge_point_id = nk.value.trim();
        const res = await fetch(`/api/kp/ingest/jobs/${encodeURIComponent(currentJobId)}/resolve`, {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
        });
        if (!res.ok) { showMsg("处理失败", false); return; }
        showMsg("已保存", true);
        await selectJob(currentJobId);
        await loadJobs(currentJobId);
      });
    });
  }

  function renderDetail(data) {
    const summary = data.catalog_diff?.summary || {};
    let actions = "";
    if (data.status === "pending_review") {
      actions = `<div class="toolbar"><button type="button" id="btnApprove" ${data.ready_to_approve?"":"disabled"}>批准入库</button>
        <button type="button" id="btnReject" class="danger secondary">拒绝</button></div>
        ${data.ready_to_approve?"":'<p class="hint">须处理全部差异项</p>'}`;
    }
    $("detailPane").innerHTML = `
      <div class="card"><h2>提交信息</h2><div class="meta-grid">
        <div>状态：${statusBadge(data.status,data.status_label)}</div>
        <div>文件：${data.display_path||data.source_filename}</div>
        <div>变更：${summary.new_units||0} 新单元 · ${summary.new_knowledge_points||0} 新KP · ${data.question_count||0} 题</div>
      </div>${actions}</div>
      <div class="card"><h2>格式校验</h2>${renderFormatChecks(data.format_validation)}</div>
      <div class="card"><h2>文档内容</h2>${renderDocumentContent(data.document_content)}</div>
      <div class="card"><h2>知识库对比</h2>${renderKbComparison(data.kb_comparison)}</div>`;
    bindResolveActions();
    $("btnApprove")?.addEventListener("click", approveJob);
    $("btnReject")?.addEventListener("click", rejectJob);
  }

  async function approveJob() {
    if (!confirm("确认批准入库？")) return;
    const res = await fetch(`/api/kp/ingest/jobs/${encodeURIComponent(currentJobId)}/approve`, { method: "POST" });
    if (!res.ok) { showMsg("入库失败", false); return; }
    const body = await res.json().catch(() => ({}));
    showMsg(body.post_approve_hint || "已批准", true);
    await loadJobs(currentJobId);
  }

  async function rejectJob() {
    const reason = prompt("拒绝原因（可选）") || "";
    const res = await fetch(`/api/kp/ingest/jobs/${encodeURIComponent(currentJobId)}/reject`, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ reason }),
    });
    if (!res.ok) { showMsg("拒绝失败", false); return; }
    showMsg("已拒绝", true);
    await loadJobs(currentJobId);
  }

  function openModal() { $("modalBackdrop").classList.add("open"); }
  function closeModal() { $("modalBackdrop").classList.remove("open"); }

  async function submitUpload() {
    const input = $("modalFile");
    if (!input.files?.length) { showMsg("请选择文件", false); return; }
    const form = new FormData();
    form.append("file", input.files[0], input.files[0].name);
    const src = $("modalSourcePath").value.trim();
    if (src) form.append("client_source_path", src);
    const res = await fetch("/api/kp/ingest/submit", { method: "POST", body: form });
    if (!res.ok) { showMsg("提交失败", false); return; }
    const data = await res.json();
    closeModal();
    showMsg(`已创建 ${data.job.job_id}`, true);
    await loadJobs(data.job.job_id);
  }

  $("btnNew").addEventListener("click", openModal);
  $("btnModalCancel").addEventListener("click", closeModal);
  $("btnModalSubmit").addEventListener("click", submitUpload);
  $("btnRefreshList").addEventListener("click", () => loadJobs(currentJobId));
  $("modalBackdrop").addEventListener("click", e => { if (e.target === $("modalBackdrop")) closeModal(); });
  const urlJob = new URLSearchParams(location.search).get("job");
  loadJobs(urlJob || undefined);
</script>
