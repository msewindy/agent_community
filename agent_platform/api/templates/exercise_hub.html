<div id="message"></div>

<div class="tabs">
  <button type="button" id="tabInbox" class="active">待归类</button>
  <button type="button" id="tabBank" class="secondary">题库概览</button>
</div>

<div id="inboxPane">
  <div class="card">
    <h2>尚未归类的题</h2>
    <p class="sub">拍照后未能自动挂上知识点的题，在此挂 KP 或忽略。</p>
    <div id="pendingList"><p class="hint">加载中…</p></div>
  </div>
</div>

<div id="bankPane" class="hidden">
  <div class="card">
    <h2>当前题库</h2>
    <p class="sub">推题数据来源（SQLite）。</p>
    <div id="overview">加载中…</div>
    <div class="toolbar" style="margin-bottom:0">
      <button type="button" id="btnRefreshBank">刷新</button>
      <a class="btn secondary" href="/api/question-bank/format-template" style="text-decoration:none">下载练习题模板</a>
    </div>
  </div>
  <div class="card">
    <h2>上传仅练习题</h2>
    <div class="toolbar" style="margin-bottom:0">
      <input type="file" id="fileInput" accept=".md,.markdown,.kp.md" />
      <button type="button" id="btnUpload">上传并提交审核</button>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let kpChoices = [];
  let studentId = "";

  function showMsg(text, ok) {
    const el = $("message");
    if (!text) { el.textContent = ""; el.className = ""; return; }
    el.className = "msg " + (ok ? "ok" : "err");
    el.textContent = text;
  }
  function currentStudentId() { return studentId; }

  function showTab(which) {
    const inbox = which === "inbox";
    $("tabInbox").classList.toggle("active", inbox);
    $("tabBank").classList.toggle("active", !inbox);
    $("inboxPane").classList.toggle("hidden", !inbox);
    $("bankPane").classList.toggle("hidden", inbox);
  }

  function renderPending(items) {
    if (!items.length) {
      $("pendingList").innerHTML = '<p class="hint">当前没有待处理项。</p>';
      return;
    }
    $("pendingList").innerHTML = items.map(it => {
      const tierLabel = { inbox: "待归类", confirm: "待确认", auto: "自动" }[it.tier] || it.tier;
      const opts = kpChoices.map(k => `<option value="${k.kp_id}">${k.title}（${k.subject}）</option>`).join("");
      return `<div class="pending-item" data-id="${it.entry_id}">
        <div><strong>${it.stem}</strong></div>
        <div class="hint" style="margin-top:0.35rem">答案：${it.student_answer || "—"} · 批改：${it.is_correct === null ? "未知" : (it.is_correct ? "对" : "错")}
          · <span class="badge pending">${tierLabel}</span></div>
        <div class="pending-actions">
          <select class="kpSel">${opts}</select>
          <label><input type="radio" name="corr_${it.entry_id}" value="wrong" checked> 错</label>
          <label><input type="radio" name="corr_${it.entry_id}" value="right"> 对</label>
          <button type="button" class="small btnResolve">挂知识点</button>
          <button type="button" class="small warn btnDrop">忽略</button>
        </div>
      </div>`;
    }).join("");
    bindPending();
  }

  function bindPending() {
    const sid = currentStudentId();
    document.querySelectorAll(".btnResolve").forEach(btn => {
      btn.onclick = async () => {
        const box = btn.closest(".pending-item");
        const entryId = box.dataset.id;
        const kp = box.querySelector(".kpSel").value;
        const isCorrect = box.querySelector(`input[name="corr_${entryId}"]:checked`).value === "right";
        const res = await fetch(`/api/students/${encodeURIComponent(sid)}/learning-profile/pending/${entryId}/resolve`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ knowledge_point_id: kp, is_correct: isCorrect }),
        });
        if (!res.ok) { showMsg("归类失败", false); return; }
        showMsg("已挂知识点", true);
        loadPending();
      };
    });
    document.querySelectorAll(".btnDrop").forEach(btn => {
      btn.onclick = async () => {
        const box = btn.closest(".pending-item");
        const entryId = box.dataset.id;
        const r = await fetch(`/api/students/${encodeURIComponent(sid)}/learning-profile/pending/${entryId}/drop`, {
          method: "POST", headers: { "Content-Type": "application/json" }, body: "{}",
        });
        if (!r.ok) { showMsg("操作失败", false); return; }
        showMsg("已忽略", true);
        loadPending();
      };
    });
  }

  async function loadPending() {
    const sid = currentStudentId();
    if (!sid) return;
    const res = await fetch(`/api/students/${encodeURIComponent(sid)}/learning-profile?include_pending=true&gap_limit=0`);
    if (!res.ok) return;
    const data = await res.json();
    kpChoices = data.kp_choices || [];
    renderPending(data.pending_items || []);
  }

  function renderOverview(data) {
    let html = `<div class="stats-row"><span class="stat-pill">总题数 <strong>${data.total_questions || 0}</strong></span></div>`;
    html += '<table class="data"><thead><tr><th>单元</th><th>学科</th><th>题数</th></tr></thead><tbody>';
    for (const u of data.units || []) {
      html += `<tr><td><code>${u.unit_id}</code><br><span class="hint">${u.unit_title||""}</span></td>
        <td>${u.subject||""} ${u.grade||""}年级</td><td>${u.question_count}</td></tr>`;
    }
    html += "</tbody></table>";
    $("overview").innerHTML = html;
  }

  async function loadBank() {
    const res = await fetch("/api/question-bank/info");
    if (res.ok) renderOverview(await res.json());
  }

  async function initPage() {
    const res = await fetch("/api/students");
    if (res.ok) {
      const students = await res.json();
      if (students.length) studentId = students[0].student_id;
    }
    await loadPending();
    await loadBank();
  }

  $("tabInbox").onclick = () => showTab("inbox");
  $("tabBank").onclick = () => showTab("bank");
  $("btnRefreshBank").onclick = loadBank;
  $("btnUpload").onclick = async () => {
    const file = $("fileInput").files[0];
    if (!file) { showMsg("请选择文件", false); return; }
    const fd = new FormData(); fd.append("file", file);
    const res = await fetch("/api/question-bank/upload", { method: "POST", body: fd });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) { showMsg("上传失败: " + (data.detail || res.status), false); return; }
    location.href = data.redirect_review || "/kp-review";
  };
  initPage();
</script>
